name: ML Pipeline Smoke Test

on:
  pull_request:

jobs:
  ml-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run small training test
        run: |
          python scripts/train.py --epochs 1
