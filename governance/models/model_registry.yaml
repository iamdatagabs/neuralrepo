models:
  - model_name: "multimodal_clinical_model_v1"
    version: "1.0.0"
    status: "staging"

    description: >
      Modelo multimodal para inferência clínica baseado em imagens médicas,
      vídeos clínicos e dados de telemetria fisiológica.

    created_at: "2026-04-15"
    trained_by: "research_team"

    modalities:
      image:
        type: "medical_imaging"
        sources: ["xray", "ct_scan", "mri"]
        preprocessing_version: "img_v1.0.0"

      video:
        type: "clinical_video"
        sources: ["surgery", "patient_monitoring"]
        preprocessing_version: "video_v1.0.0"

      telemetry:
        type: "time_series"
        sources: ["ecg", "spo2", "heart_rate", "bp"]
        sampling_rate: "variable"
        preprocessing_version: "ts_v1.0.0"

    dataset:
      name: "multimodal_clinical_dataset_v1"
      version: "1.0.0"

    fusion_strategy: "late_fusion"

    metrics:
      auc: 0.93
      accuracy: 0.89
      temporal_consistency_score: 0.87

    clinical_safety:
      validated: false
      bias_assessment_done: false
      approved_for_clinical_use: false

    artifacts:
      image_encoder: "checkpoints/img_encoder.pt"
      video_encoder: "checkpoints/video_encoder.pt"
      telemetry_encoder: "checkpoints/ts_encoder.pt"
      fusion_model: "checkpoints/fusion.pt"

    notes: >
      Modelo multimodal experimental. Requer validação clínica por modalidade.
